<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login — Nexus Web</title>

    <style>

        body {

            margin: 0;

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            font-family: Arial, sans-serif;

            background-color: #111827;

            color: white;

        }


        .login {

            width: 90%;

            max-width: 400px;

            padding: 30px;

            border-radius: 15px;

            background-color: #1f2937;

            box-sizing: border-box;

        }


        h1 {

            text-align: center;

        }


        input {

            width: 100%;

            padding: 15px;

            margin-top: 20px;

            border: none;

            border-radius: 8px;

            box-sizing: border-box;

            font-size: 17px;

        }


        button {

            width: 100%;

            margin-top: 15px;

            padding: 14px;

            border: none;

            border-radius: 8px;

            background-color: #2563eb;

            color: white;

            font-size: 16px;

            cursor: pointer;

        }


        .erro {

            margin-top: 20px;

            padding: 12px;

            border-radius: 8px;

            text-align: center;

            background-color: #7f1d1d;

        }

    </style>

</head>


<body>

    <main class="login">

        <h1>Nexus Web</h1>

        <form method="POST">

            <input

                type="password"

                name="senha"

                placeholder="Digite a senha"

                required

                autofocus

            >


            <button type="submit">

                Entrar

            </button>

        </form>


        {% if erro %}

            <div class="erro">

                {{ erro }}

            </div>

        {% endif %}

    </main>

</body>

</html>
